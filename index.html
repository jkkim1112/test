<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>층별 핀 관리</title>
<style>
* { box-sizing: border-box; }
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f3f4f6;
    color: #111827;
    font-size: 14px;
}
.page {
    max-width: 1000px;
    margin: 0 auto;
    padding: 10px;
}
.tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
}
.tab-btn {
    border: none;
    border-radius: 8px;
    padding: 9px 14px;
    background: #d1d5db;
    color: #111827;
    font-size: 14px;
    cursor: pointer;
}
.tab-btn.active {
    background: #2563eb;
    color: #fff;
}
.board-wrap {
    background: #fff;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    overflow: hidden;
}
.image-wrap {
    position: relative;
    width: 100%;
    background: #fff;
    line-height: 0;
}
.image-wrap img {
    display: block;
    width: 100%;
    height: auto;
    user-select: none;
    -webkit-user-drag: none;
}
.pin-layer {
    position: absolute;
    inset: 0;
}
.pin {
    position: absolute;
    width: 18px;
    height: 18px;
    transform: translate(-50%, -50%);
    border: 2px solid #fff;
    border-radius: 50%;
    background: #dc2626;
    box-shadow: 0 2px 6px rgba(0,0,0,0.28);
    cursor: pointer;
    z-index: 2;
}
.pin-label {
    position: absolute;
    transform: translate(-50%, calc(-100% - 8px));
    background: rgba(17,24,39,0.88);
    color: #fff;
    padding: 3px 6px;
    border-radius: 5px;
    font-size: 11px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 1;
}
.section {
    margin-top: 10px;
    background: #fff;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    padding: 10px;
}
.section-title {
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 8px;
}
.pin-list {
    display: flex;
    flex-direction: column;
    gap: 0;
}
.pin-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid #e5e7eb;
}
.pin-item:last-child {
    border-bottom: none;
}
.pin-item-text {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 13px;
}
.delete-btn {
    border: none;
    border-radius: 6px;
    background: #dc2626;
    color: #fff;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
    flex-shrink: 0;
}
.empty-text {
    color: #6b7280;
    font-size: 13px;
    padding: 6px 0;
}
.modal-backdrop {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    padding: 16px;
}
.modal {
    width: 100%;
    max-width: 340px;
    background: #fff;
    border-radius: 10px;
    padding: 14px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.22);
}
.modal h3 {
    margin: 0 0 10px 0;
    font-size: 16px;
}
.form-row, .view-row {
    margin-bottom: 10px;
}
.form-row label, .view-label {
    display: block;
    margin-bottom: 5px;
    font-size: 13px;
    font-weight: bold;
}
.form-row input {
    width: 100%;
    padding: 10px;
    font-size: 15px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
}
.view-value {
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    background: #f9fafb;
    font-size: 13px;
}
.modal-buttons {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
}
.btn {
    border: none;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
}
.btn-gray { background: #d1d5db; color: #111827; }
.btn-blue { background: #2563eb; color: #fff; }
.btn-red { background: #dc2626; color: #fff; margin-right: auto; }
.status-text {
    margin-top: 8px;
    font-size: 12px;
    color: #6b7280;
}
@media (max-width: 768px) {
    .page { padding: 8px; }
    .tab-btn { flex: 1; }
    .pin { width: 14px; height: 14px; }
    .pin-label { display: none; }
    .pin-item { align-items: flex-start; }
    .modal-buttons { flex-direction: column; }
    .btn-red { margin-right: 0; }
    .btn { width: 100%; }
}
</style>
</head>
<body>
<div class="page">
    <div class="tabs" id="tabs">
        <button type="button" class="tab-btn active" data-id="floor1">1층</button>
        <button type="button" class="tab-btn" data-id="floor2">2층</button>
    </div>

    <div class="board-wrap">
        <div class="image-wrap" id="imageWrap">
            <img id="bgImage" src="./1.png" alt="1층 배경">
            <div class="pin-layer" id="pinLayer"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title" id="listTitle">1층 핀 목록</div>
        <div class="pin-list" id="pinList"></div>
        <div class="status-text" id="statusText"></div>
    </div>
</div>

<div class="modal-backdrop" id="createModalBackdrop">
    <div class="modal">
        <h3>핀 정보 입력</h3>
        <div class="form-row">
            <label for="pinName">이름</label>
            <input type="text" id="pinName" placeholder="이름을 입력해주세요">
        </div>
        <div class="modal-buttons">
            <button class="btn btn-gray" id="cancelCreateBtn" type="button">취소</button>
            <button class="btn btn-blue" id="saveBtn" type="button">저장</button>
        </div>
    </div>
</div>

<div class="modal-backdrop" id="viewModalBackdrop">
    <div class="modal">
        <h3>핀 정보</h3>
        <div class="view-row">
            <div class="view-label">날짜</div>
            <div class="view-value" id="viewDate"></div>
        </div>
        <div class="view-row">
            <div class="view-label">시간</div>
            <div class="view-value" id="viewTime"></div>
        </div>
        <div class="view-row">
            <div class="view-label">이름</div>
            <div class="view-value" id="viewName"></div>
        </div>
        <div class="modal-buttons">
            <button class="btn btn-red" id="deleteBtn" type="button">삭제</button>
            <button class="btn btn-gray" id="closeViewBtn" type="button">닫기</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const SUPABASE_URL = 'https://dxghzwuqaqdjrrzsfgxs.supabase.co';
    const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_8HUjVjxFedCupJ2S_G6H6A_gLQ4wm8n';
    const PINS_TABLE = 'pins';

    const BOARDS = [
        { id: 'floor1', name: '1층', image: './1.png' },
        { id: 'floor2', name: '2층', image: './2.png' }
    ];

    const tabs = document.getElementById('tabs');
    const imageWrap = document.getElementById('imageWrap');
    const bgImage = document.getElementById('bgImage');
    const pinLayer = document.getElementById('pinLayer');
    const listTitle = document.getElementById('listTitle');
    const pinList = document.getElementById('pinList');
    const statusText = document.getElementById('statusText');

    const createModalBackdrop = document.getElementById('createModalBackdrop');
    const pinName = document.getElementById('pinName');
    const cancelCreateBtn = document.getElementById('cancelCreateBtn');
    const saveBtn = document.getElementById('saveBtn');

    const viewModalBackdrop = document.getElementById('viewModalBackdrop');
    const viewDate = document.getElementById('viewDate');
    const viewTime = document.getElementById('viewTime');
    const viewName = document.getElementById('viewName');
    const deleteBtn = document.getElementById('deleteBtn');
    const closeViewBtn = document.getElementById('closeViewBtn');

    let currentBoardId = BOARDS[0].id;
    let pendingPoint = null;
    let selectedPinId = null;
    let store = {};
    let supabase = null;

    function setStatus(message) {
        statusText.textContent = message || '';
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function getNowInfo() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        return { date: `${y}-${m}-${d}`, time: `${hh}:${mm}:${ss}` };
    }

    function getCurrentPins() {
        return store[currentBoardId] || [];
    }

    function renderTabs() {
        tabs.innerHTML = BOARDS.map(board => `
            <button type="button" class="tab-btn ${board.id === currentBoardId ? 'active' : ''}" data-id="${board.id}">
                ${board.name}
            </button>
        `).join('');
    }

    function renderImage() {
        const board = BOARDS.find(item => item.id === currentBoardId) || BOARDS[0];
        bgImage.src = board.image;
        bgImage.alt = board.name + ' 배경';
        listTitle.textContent = `${board.name} 핀 목록`;
    }

    function renderPins() {
        const rect = bgImage.getBoundingClientRect();
        pinLayer.innerHTML = '';

        getCurrentPins().forEach(item => {
            const x = item.x_ratio * rect.width;
            const y = item.y_ratio * rect.height;

            const pin = document.createElement('button');
            pin.type = 'button';
            pin.className = 'pin';
            pin.style.left = `${x}px`;
            pin.style.top = `${y}px`;
            pin.dataset.id = item.id;
            pin.title = `${item.name} / ${item.pin_date} ${item.pin_time}`;
            pin.addEventListener('click', function (event) {
                event.preventDefault();
                event.stopPropagation();
                openViewModal(item.id);
            });

            const label = document.createElement('div');
            label.className = 'pin-label';
            label.style.left = `${x}px`;
            label.style.top = `${y}px`;
            label.textContent = `${item.name} (${item.pin_date} ${item.pin_time})`;

            pinLayer.appendChild(pin);
            pinLayer.appendChild(label);
        });
    }

    function renderList() {
        const pins = getCurrentPins();
        if (pins.length === 0) {
            pinList.innerHTML = '<div class="empty-text">저장된 핀이 없습니다.</div>';
            return;
        }

        pinList.innerHTML = pins.map((item, index) => `
            <div class="pin-item">
                <div class="pin-item-text">${index + 1}. 이름: ${escapeHtml(item.name)} / 날짜: ${item.pin_date} / 시간: ${item.pin_time}</div>
                <button type="button" class="delete-btn" data-id="${item.id}">삭제</button>
            </div>
        `).join('');
    }

    function renderAll() {
        renderTabs();
        renderImage();
        renderPins();
        renderList();
    }

    function openCreateModal(point) {
        pendingPoint = point;
        pinName.value = '';
        createModalBackdrop.style.display = 'flex';
        setTimeout(() => pinName.focus(), 0);
    }

    function closeCreateModal() {
        createModalBackdrop.style.display = 'none';
        pendingPoint = null;
    }

    function openViewModal(pinId) {
        const pin = getCurrentPins().find(item => item.id === pinId);
        if (!pin) return;
        selectedPinId = pinId;
        viewDate.textContent = pin.pin_date;
        viewTime.textContent = pin.pin_time;
        viewName.textContent = pin.name;
        viewModalBackdrop.style.display = 'flex';
    }

    function closeViewModal() {
        viewModalBackdrop.style.display = 'none';
        selectedPinId = null;
    }

    async function loadPins() {
        if (!supabase) {
            setStatus('공용 저장소 연결 전입니다.');
            return;
        }

        setStatus('데이터를 다시 불러오는 중입니다.');

        const { data, error } = await supabase
            .from(PINS_TABLE)
            .select('id, board_id, x_ratio, y_ratio, name, pin_date, pin_time, created_at')
            .order('created_at', { ascending: true });

        if (error) {
            console.error(error);
            setStatus('핀 목록을 불러오지 못했습니다.');
            return;
        }

        store = {};
        BOARDS.forEach(board => {
            store[board.id] = [];
        });

        (data || []).forEach(item => {
            if (!Array.isArray(store[item.board_id])) {
                store[item.board_id] = [];
            }
            store[item.board_id].push(item);
        });

        renderAll();
        setStatus('공용 저장소 연결됨');
    }

    async function createPin(payload) {
        if (!supabase) {
            alert('Supabase 연결이 아직 준비되지 않았습니다.');
            return false;
        }

        const { error } = await supabase.from(PINS_TABLE).insert(payload);
        if (error) {
            console.error(error);
            alert('핀 저장에 실패했습니다.');
            return false;
        }

        await loadPins();
        return true;
    }

    async function deletePin(pinId) {
        const target = getCurrentPins().find(item => item.id === pinId);
        if (!target) return false;

        const ok = confirm(`${target.name} 핀을 삭제하시겠습니까?`);
        if (!ok) return false;

        const { error } = await supabase.from(PINS_TABLE).delete().eq('id', pinId);
        if (error) {
            console.error(error);
            alert('핀 삭제에 실패했습니다.');
            return false;
        }

        await loadPins();
        closeViewModal();
        return true;
    }

    renderAll();
    setStatus('화면 초기화 완료');

    tabs.addEventListener('click', async function (event) {
        const button = event.target.closest('.tab-btn[data-id]');
        if (!button) return;
        currentBoardId = button.dataset.id;
        closeCreateModal();
        closeViewModal();
        renderAll();

        if (supabase) {
            await loadPins();
        }
    });

    imageWrap.addEventListener('click', function (event) {
        if (event.target !== bgImage && event.target !== pinLayer && event.target !== imageWrap) return;

        const rect = bgImage.getBoundingClientRect();
        const clickX = event.clientX - rect.left;
        const clickY = event.clientY - rect.top;

        if (clickX < 0 || clickY < 0 || clickX > rect.width || clickY > rect.height) return;

        openCreateModal({
            xRatio: clickX / rect.width,
            yRatio: clickY / rect.height
        });
    });

    pinList.addEventListener('click', async function (event) {
        const button = event.target.closest('button.delete-btn[data-id]');
        if (!button) return;
        event.preventDefault();
        event.stopPropagation();
        await deletePin(button.dataset.id);
    });

    saveBtn.addEventListener('click', async function () {
        if (!pendingPoint) return;

        const name = pinName.value.trim();
        if (!name) {
            alert('이름을 입력해주세요.');
            pinName.focus();
            return;
        }

        const nowInfo = getNowInfo();

        const ok = await createPin({
            board_id: currentBoardId,
            x_ratio: pendingPoint.xRatio,
            y_ratio: pendingPoint.yRatio,
            name: name,
            pin_date: nowInfo.date,
            pin_time: nowInfo.time
        });

        if (ok) {
            closeCreateModal();
        }
    });

    cancelCreateBtn.addEventListener('click', closeCreateModal);
    closeViewBtn.addEventListener('click', closeViewModal);
    deleteBtn.addEventListener('click', async function () {
        if (!selectedPinId) return;
        await deletePin(selectedPinId);
    });

    createModalBackdrop.addEventListener('click', function (event) {
        if (event.target === createModalBackdrop) closeCreateModal();
    });

    viewModalBackdrop.addEventListener('click', function (event) {
        if (event.target === viewModalBackdrop) closeViewModal();
    });

    window.addEventListener('resize', function () {
        renderPins();
    });

    bgImage.addEventListener('load', function () {
        renderPins();
    });

    try {
        if (window.supabase && typeof window.supabase.createClient === 'function') {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
            loadPins();
        } else {
            setStatus('Supabase 라이브러리를 불러오지 못했습니다.');
        }
    } catch (error) {
        console.error(error);
        setStatus('Supabase 초기화에 실패했습니다.');
    }
});
</script>
</body>
</html>
